name: 매일 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 18 * * *'  # 매일 새벽 3시 (한국시간 = UTC+9)
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: Python 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 패키지 설치
      run: |
        pip install requests pandas scikit-learn xgboost joblib numpy

    - name: 데이터 업데이트 스크립트 실행
      env:
        FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      run: python update_data.py

    - name: 변경사항 커밋 & 푸시
      run: |
        git config --global user.email "eattotoys@gmail.com"
        git config --global user.name "k1yuse"
        git add fotdata_model/
        git diff --staged --quiet || git commit -m "자동 데이터 업데이트 $(date '+%Y-%m-%d')"
        git push

name: 매일 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Python 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 패키지 설치
      run: |
        pip install requests pandas scikit-learn xgboost joblib numpy

    - name: 데이터 업데이트 스크립트 실행
      env:
        FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      run: python update_data.py

    - name: 변경사항 커밋 & 푸시
      run: |
        git config --global user.email "eattotoys@gmail.com"
        git config --global user.name "k1yuse"
        git add fotdata_model/
        git diff --staged --quiet || git commit -m "자동 데이터 업데이트 $(date '+%Y-%m-%d')"
        git push